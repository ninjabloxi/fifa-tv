<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIFA TV - Connexion</title>

<link rel="stylesheet" href="https://fifa-tv-web.vercel.app/style.css">

</head>


<body>


<div class="container">


    <div class="title">
        Connectez vous pour<br>
        accéder à FIFA TV
    </div>



    <div class="login-card">


        <div class="login-title">
            Continuer avec une adresse mail
        </div>



        <button class="email-button">


            <img src="mail.png">


            <div class="email-text">
                exemple@mail.com
            </div>


        </button>



        <div class="resend">
            (Connexion mail bientôt disponible)
        </div>


    </div>




    <button
        class="google-button"
        id="googleBtn">


        <img src="google.png">


        <span>
            Continuer avec Google
        </span>


    </button>




    <div
    class="status"
    id="status">

    </div>



</div>




<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { 
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";




// Configuration Firebase
// Ces valeurs ne sont pas des secrets

const firebaseConfig = {


    apiKey: "TON_API_KEY",

    authDomain: "TON_AUTH_DOMAIN",

    projectId: "TON_PROJECT_ID",


};




const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const provider =
new GoogleAuthProvider();




const googleBtn =
document.getElementById(
"googleBtn"
);



const status =
document.getElementById(
"status"
);





googleBtn.onclick =
async()=>{


try{


await signInWithPopup(
auth,
provider
);



}

catch(error){


status.textContent =
error.message;


}


};





onAuthStateChanged(
auth,
(user)=>{


if(user){


status.textContent =
"Connecté : " +
user.displayName;



setTimeout(()=>{


document.body.classList.add(
"fadeOut"
);



setTimeout(()=>{


window.location.href =
"home.html";


},500);



},1000);



}



});


</script>



</body>

</html>
