<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIFA TV</title>

<link rel="stylesheet" href="style.css">

<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-title" content="FIFA TV">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="manifest.json">

</head>
<body>

<div id="splash">

    <img
        src="biglogo.png"
        id="biglogo"
        alt="FIFA TV">

</div>

<div
    id="languageScreen"
    class="page"
    style="
        display:none;
        position:fixed;
        inset:0;
        background:black;
    ">

    <h1 id="title">
        Hi, choose your language :
    </h1>

    <div class="language-box">

        <select id="language">

            <option value="en">
                English (USA)
            </option>

            <option value="fr">
                Français
            </option>

            <option value="es">
                Español
            </option>

            <option value="de">
                Deutsch
            </option>

            <option value="it">
                Italiano
            </option>

            <option value="pt">
                Português
            </option>

            <option value="nl">
                Nederlands
            </option>

            <option value="pl">
                Polski
            </option>

            <option value="tr">
                Türkçe
            </option>

            <option value="ar">
                العربية
            </option>

            <option value="ru">
                Русский
            </option>

            <option value="zh">
                中文
            </option>

            <option value="ja">
                日本語
            </option>

            <option value="ko">
                한국어
            </option>

        </select>

    </div>

    <button
        class="btn"
        id="continueBtn"
        style="
            position:absolute;
            right:40px;
            bottom:40px;
            width:240px;
        ">

        Continue

    </button>

</div>

<script>

const savedLanguage =
localStorage.getItem(
    "language"
);

const translations = {

    en:{
        title:"Hi, choose your language :",
        button:"Continue"
    },

    fr:{
        title:"Salut, choisissez votre langue :",
        button:"Continuer"
    },

    es:{
        title:"Hola, elige tu idioma :",
        button:"Continuar"
    },

    de:{
        title:"Hallo, wählen Sie Ihre Sprache :",
        button:"Weiter"
    }

};

if(savedLanguage){

    setTimeout(() => {

        document.body.classList.add(
            "fade-out"
        );

        setTimeout(() => {

            window.location.href =
            "login.html";

        },500);

    },3000);

}
else{

    setTimeout(() => {

        document.getElementById(
            "languageScreen"
        ).style.display = "block";

    },2500);

}

setTimeout(() => {

    const splash =
    document.getElementById(
        "splash"
    );

    if(splash){

        splash.remove();

    }

},3500);

const language =
document.getElementById(
    "language"
);

language.addEventListener(
    "change",
    () => {

        const lang =
        language.value;

        if(
            translations[lang]
        ){

            document
            .getElementById(
                "title"
            ).textContent =
            translations[lang]
            .title;

            document
            .getElementById(
                "continueBtn"
            ).textContent =
            translations[lang]
            .button;

        }

    }
);

document
.getElementById(
    "continueBtn"
)
.addEventListener(
    "click",
    () => {

        localStorage.setItem(
            "language",
            language.value
        );

        document.body
        .classList
        .add(
            "fade-out"
        );

        setTimeout(() => {

            window.location.href =
            "login.html";

        },500);

    }
);

</script>

</body>
</html>
